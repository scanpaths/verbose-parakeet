<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Picks">
<title>Picks</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #fff;
  min-height: 100vh;
}
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-width: 420px;
  margin: 0 auto;
}

/* setup */
#setup {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 28px 64px;
  min-height: 100vh;
}
#setup h1 {
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: #000; margin-bottom: 32px;
}
#setup p { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 20px; }
#setup a { color: #000; }
#setup label { font-size: 11px; color: #999; letter-spacing: 0.03em; margin-bottom: 7px; display: block; }
#token-input {
  width: 100%; height: 42px;
  border: 1px solid #e8e8e8; border-radius: 3px;
  padding: 0 11px; font-size: 12px; font-family: monospace;
  color: #000; background: #fff; margin-bottom: 16px; outline: none;
}
#token-input:focus { border-color: #000; }
#btn-save {
  width: 100%; height: 42px; background: #000; color: #fff;
  border: none; border-radius: 3px; font-size: 12px; font-weight: 500;
  letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s;
}
#btn-save:active { opacity: 0.75; }
#btn-save:disabled { opacity: 0.3; }

/* main */
#main { display: none; flex-direction: column; min-height: 100vh; }
header {
  padding: 44px 20px 10px;
  display: flex; align-items: flex-end; justify-content: space-between;
}
h1.main-title {
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase; color: #000;
}
.reset-btn {
  font-size: 10px; color: #ccc; background: none;
  border: none; cursor: pointer; padding: 0; letter-spacing: 0.03em;
}
.reset-btn:active { color: #000; }

/* cards */
.picks {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 12px 20px 0;
  gap: 10px;
}
.pick {
  border: 1px solid #e8e8e8;
  border-radius: 3px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 80px;
  flex: 1;
}
.pick-label {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: #bbb;
  padding: 8px 10px 4px;
}
.pick-inner { flex: 1; display: flex; flex-direction: column; }
.pick-image {
  width: 100%; height: 120px;
  object-fit: cover; display: block; background: #f5f5f5;
}
.pick-text {
  padding: 8px 10px 10px;
  font-size: 12px; line-height: 1.5; color: #222; flex: 1;
}
.pick-title {
  font-size: 12px; font-weight: 500; color: #000;
  padding: 4px 10px 2px; line-height: 1.4;
}
.pick-source {
  font-size: 10px; color: #bbb;
  padding: 0 10px 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pick-meta { font-size: 10px; color: #ccc; padding: 4px 10px 8px; }
.pick-empty {
  display: flex; align-items: center; justify-content: center;
  flex: 1; min-height: 60px;
  font-size: 11px; color: #ddd;
}

/* action bar */
.actions { padding: 12px 20px 44px; display: flex; gap: 8px; }
.btn-roll {
  flex: 1; height: 42px; background: #000; color: #fff;
  border: none; border-radius: 3px; font-size: 12px; font-weight: 500;
  letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s;
}
.btn-roll:active { opacity: 0.75; }
.btn-roll:disabled { opacity: 0.3; cursor: default; }
.loading-bar {
  height: 2px; background: #000; width: 0%;
  transition: width 0.5s; position: fixed; top: 0; left: 0; z-index: 100;
}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>

<div id="setup">
  <h1>Picks</h1>
  <p>Paste your Are.na personal access token below. It's stored only on this device and never sent anywhere else.</p>
  <p>Get yours at <a href="https://www.are.na/developers/personal-access-tokens" target="_blank">are.na/developers/personal-access-tokens</a> → New personal access token.</p>
  <label for="token-input">Access token</label>
  <input type="password" id="token-input" placeholder="paste token here" autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="btn-save">Save and continue</button>
</div>

<div id="main">
  <header>
    <h1 class="main-title">Picks</h1>
    <button class="reset-btn" id="btn-reset">reset token</button>
  </header>
  <div class="picks" id="picks"></div>
  <div class="actions">
    <button class="btn-roll" id="btn-roll">Roll</button>
  </div>
</div>

<script>
const CHANNELS = [
  { slug: "people-a3xhg4iu7yu",          label: "People" },
  { slug: "readings-2026-mkpmglbdf_0",    label: "Readings" },
  { slug: "the-world-of-yesterday",       label: "Yesterday" }
];

const TOKEN_KEY = 'arena_picks_token';
let token = localStorage.getItem(TOKEN_KEY) || '';
let loading = false;

const setupEl    = document.getElementById('setup');
const mainEl     = document.getElementById('main');
const tokenInput = document.getElementById('token-input');
const btnSave    = document.getElementById('btn-save');
const picksEl    = document.getElementById('picks');
const btnRoll    = document.getElementById('btn-roll');
const btnReset   = document.getElementById('btn-reset');
const bar        = document.getElementById('loading-bar');

function showMain()  { setupEl.style.display = 'none'; mainEl.style.display = 'flex'; buildSlots(); }
function showSetup() { mainEl.style.display  = 'none'; setupEl.style.display = 'flex'; tokenInput.value = ''; }

if (token) showMain(); else showSetup();

btnSave.onclick = () => {
  const val = tokenInput.value.trim();
  if (!val) return;
  localStorage.setItem(TOKEN_KEY, val);
  token = val;
  showMain();
};

btnReset.onclick = () => { localStorage.removeItem(TOKEN_KEY); token = ''; showSetup(); };

function buildSlots() {
  picksEl.innerHTML = '';
  CHANNELS.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'pick';
    div.id = `pick-${i}`;
    div.innerHTML = `<div class="pick-label">${ch.label}</div><div class="pick-inner"><div class="pick-empty">—</div></div>`;
    picksEl.appendChild(div);
  });
}

function setLoading(v) {
  loading = v; btnRoll.disabled = v;
  btnRoll.textContent = v ? '…' : 'Roll';
  bar.style.width = v ? '65%' : '100%';
  if (!v) setTimeout(() => { bar.style.width = '0%'; }, 350);
}

function authH() { return { Authorization: `Bearer ${token}` }; }

function setSlotLoading(i, ch) {
  const slot = document.getElementById(`pick-${i}`);
  if (slot) slot.innerHTML = `<div class="pick-label">${ch.label}</div><div class="pick-inner"><div class="pick-empty">…</div></div>`;
}

async function fetchOne(ch) {
  const slug = ch.slug;
  const infoRes = await fetch(`https://api.are.na/v2/channels/${slug}?per=1&page=1`, { headers: authH() });
  if (infoRes.status === 401) throw Object.assign(new Error(), { auth: true });
  if (!infoRes.ok) throw new Error();
  const info = await infoRes.json();
  const total = info.length;
  if (!total) return null;
  const page = Math.floor(Math.random() * total) + 1;
  const contRes = await fetch(`https://api.are.na/v2/channels/${slug}/contents?per=1&page=${page}&sort=position`, { headers: authH() });
  if (!contRes.ok) throw new Error();
  const data = await contRes.json();
  return data.contents && data.contents[0];
}

function renderSlot(i, ch, block) {
  const slot = document.getElementById(`pick-${i}`);
  if (!slot) return;
  let inner = '';

  if (!block) {
    inner = '<div class="pick-empty">nothing returned</div>';
  } else {
    const hasImage = block.image && block.image.original && block.image.original.url;
    const added = block.created_at
      ? new Date(block.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
      : '';
    const url = `https://www.are.na/block/${block.id}`;
    const a = (content) => `<a href="${url}" target="_blank" style="display:contents;text-decoration:none;">${content}</a>`;

    if (hasImage) {
      const title  = block.title || '';
      const source = block.source ? block.source.url : '';
      inner = a(`
        <img class="pick-image" src="${esc(block.image.original.url)}" alt="${esc(title)}">
        ${title  ? `<div class="pick-title">${esc(title)}</div>` : ''}
        ${source ? `<div class="pick-source">${esc(source)}</div>` : `<div class="pick-meta">${added}</div>`}
      `);
    } else if (block.class === 'Text') {
      const content = block.content || block.title || '';
      inner = a(`
        <div class="pick-text">${esc(content).substring(0, 300)}${content.length > 300 ? '…' : ''}</div>
        <div class="pick-meta">${added}</div>
      `);
    } else {
      const title  = block.title || block.description || '';
      const source = block.source ? block.source.url : '';
      inner = a(`
        ${title  ? `<div class="pick-title">${esc(title)}</div>` : ''}
        ${source ? `<div class="pick-source">${esc(source)}</div>` : ''}
        <div class="pick-meta">${esc(block.class)} · ${added}</div>
      `);
    }
  }

  slot.innerHTML = `<div class="pick-label">${ch.label}</div><div class="pick-inner">${inner}</div>`;
}

async function rollAll() {
  if (loading) return;
  setLoading(true);
  CHANNELS.forEach((ch, i) => setSlotLoading(i, ch));
  let authFailed = false;
  await Promise.all(CHANNELS.map(async (ch, i) => {
    try {
      const block = await fetchOne(ch);
      renderSlot(i, ch, block);
    } catch(e) {
      if (e.auth) { authFailed = true; return; }
      renderSlot(i, ch, null);
    }
  }));
  if (authFailed) { localStorage.removeItem(TOKEN_KEY); token = ''; showSetup(); }
  setLoading(false);
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

btnRoll.onclick = rollAll;
</script>
</body>
</html>
