<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Picks">
<title>Picks</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-width: 420px;
  margin: 0 auto;
}
header {
  padding: 52px 24px 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
h1 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #000;
}
.channel-tabs {
  display: flex;
  padding: 0 24px;
  border-bottom: 1px solid #e8e8e8;
  overflow-x: auto;
  scrollbar-width: none;
}
.channel-tabs::-webkit-scrollbar { display: none; }
.tab {
  font-size: 12px;
  font-weight: 400;
  color: #999;
  padding: 8px 0;
  margin-right: 20px;
  border: none;
  background: none;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 1.5px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
  letter-spacing: 0.02em;
}
.tab.active {
  color: #000;
  border-bottom-color: #000;
}
.block-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 24px;
  gap: 16px;
}
.block-card {
  border: 1px solid #e8e8e8;
  border-radius: 4px;
  overflow: hidden;
  background: #fff;
  min-height: 240px;
  display: flex;
  flex-direction: column;
}
.block-image {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
  display: block;
  background: #f5f5f5;
}
.block-image.portrait { aspect-ratio: 3/4; }
.block-meta {
  padding: 12px 14px;
  border-top: 1px solid #e8e8e8;
}
.block-title {
  font-size: 13px;
  font-weight: 500;
  color: #000;
  margin-bottom: 3px;
  line-height: 1.4;
}
.block-source {
  font-size: 11px;
  color: #999;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-text {
  padding: 20px;
  font-size: 15px;
  line-height: 1.6;
  color: #222;
  flex: 1;
}
.block-link {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.block-link-title {
  font-size: 15px;
  font-weight: 500;
  color: #000;
  line-height: 1.4;
}
.block-link-desc {
  font-size: 13px;
  color: #666;
  line-height: 1.5;
}
.block-link-url {
  font-size: 11px;
  color: #aaa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: auto;
}
.block-attachment {
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
}
.block-attachment-info { flex: 1; min-width: 0; }
.block-attachment-name {
  font-size: 13px;
  font-weight: 500;
  color: #000;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-attachment-type {
  font-size: 11px;
  color: #aaa;
  margin-top: 2px;
}
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  color: #bbb;
  font-size: 13px;
  gap: 8px;
  text-align: center;
}
.actions {
  padding: 16px 24px 48px;
  display: flex;
  gap: 10px;
}
.btn-pick {
  flex: 1;
  height: 44px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-pick:active { opacity: 0.75; }
.btn-pick:disabled { opacity: 0.3; cursor: default; }
.btn-open {
  height: 44px;
  padding: 0 16px;
  background: none;
  color: #000;
  border: 1px solid #e8e8e8;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  text-decoration: none;
  display: flex;
  align-items: center;
}
.btn-open:active { background: #f5f5f5; }
.btn-open:disabled { opacity: 0.3; cursor: default; }
.loading-bar {
  height: 2px;
  background: #000;
  width: 0%;
  transition: width 0.4s;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
}
.block-type-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #bbb;
  padding: 12px 14px 0;
}
.block-footer {
  font-size: 11px;
  color: #bbb;
  text-align: center;
  padding: 8px 0 4px;
}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div id="app">
  <header>
    <h1>Picks</h1>
  </header>

  <div class="channel-tabs" id="channel-tabs"></div>

  <div class="block-area" id="block-area">
    <div class="empty-state">tap pick to pull a random block</div>
  </div>

  <div class="actions">
    <button class="btn-pick" id="btn-pick">Pick</button>
    <a class="btn-open" id="btn-open" style="pointer-events:none; opacity:0.3;" target="_blank">Open ↗</a>
  </div>
</div>

<script>
const CHANNELS = [
  { slug: "people-a3xhg4iu7yu",          label: "People" },
  { slug: "readings-2026-mkpmglbdf_0",    label: "Readings" },
  { slug: "the-world-of-yesterday",       label: "Yesterday" }
];

let activeChannel = 0;
let currentBlock = null;
let loading = false;

const tabsEl   = document.getElementById('channel-tabs');
const blockArea = document.getElementById('block-area');
const btnPick  = document.getElementById('btn-pick');
const btnOpen  = document.getElementById('btn-open');
const bar      = document.getElementById('loading-bar');

CHANNELS.forEach((ch, i) => {
  const tab = document.createElement('button');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = ch.label;
  tab.onclick = () => {
    activeChannel = i;
    document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
    currentBlock = null;
    disableOpen();
    blockArea.innerHTML = '<div class="empty-state">tap pick to pull a random block</div>';
  };
  tabsEl.appendChild(tab);
});

function setLoading(v) {
  loading = v;
  btnPick.disabled = v;
  btnPick.textContent = v ? '…' : 'Pick';
  bar.style.width = v ? '65%' : '100%';
  if (!v) setTimeout(() => { bar.style.width = '0%'; }, 350);
}

function disableOpen() {
  btnOpen.style.pointerEvents = 'none';
  btnOpen.style.opacity = '0.3';
  btnOpen.removeAttribute('href');
}

function enableOpen(url) {
  btnOpen.style.pointerEvents = '';
  btnOpen.style.opacity = '1';
  btnOpen.href = url;
}

async function fetchRandom() {
  if (loading) return;
  setLoading(true);
  disableOpen();

  const slug = CHANNELS[activeChannel].slug;

  try {
    const infoRes = await fetch(`https://api.are.na/v2/channels/${slug}?per=1&page=1`);
    if (!infoRes.ok) throw new Error('channel fetch failed');
    const info = await infoRes.json();
    const total = info.length;

    if (!total) {
      renderEmpty('No blocks in this channel');
      setLoading(false);
      return;
    }

    const page = Math.floor(Math.random() * total) + 1;
    const contRes = await fetch(`https://api.are.na/v2/channels/${slug}/contents?per=1&page=${page}&sort=position`);
    if (!contRes.ok) throw new Error('contents fetch failed');
    const data = await contRes.json();
    const block = data.contents && data.contents[0];

    if (!block) {
      renderEmpty('No block returned — try again');
      setLoading(false);
      return;
    }

    currentBlock = block;
    renderBlock(block);
    enableOpen(`https://www.are.na/block/${block.id}`);

  } catch (e) {
    renderEmpty('Could not reach Are.na.\nCheck your connection and try again.');
  }

  setLoading(false);
}

function renderBlock(block) {
  const type = block.class;
  let inner = '';

  const hasImage = block.image && block.image.original && block.image.original.url;

  if (hasImage) {
    const imgUrl = block.image.original.url;
    const w = block.image.original.width || 1;
    const h = block.image.original.height || 1;
    const portrait = h > w * 1.1;
    const title = block.title || '';
    const source = block.source ? block.source.url : '';
    inner = `
      <div class="block-type-label">${esc(type)}</div>
      <img class="block-image${portrait ? ' portrait' : ''}" src="${esc(imgUrl)}" alt="${esc(title)}">
      <div class="block-meta">
        ${title ? `<div class="block-title">${esc(title)}</div>` : ''}
        ${source ? `<div class="block-source">${esc(source)}</div>` : ''}
      </div>`;

  } else if (type === 'Text') {
    const content = block.content || block.title || '';
    inner = `
      <div class="block-type-label">Text</div>
      <div class="block-text">${esc(content).substring(0, 800)}${content.length > 800 ? '…' : ''}</div>`;

  } else if (type === 'Link') {
    inner = `
      <div class="block-type-label">Link</div>
      <div class="block-link">
        ${block.title       ? `<div class="block-link-title">${esc(block.title)}</div>` : ''}
        ${block.description ? `<div class="block-link-desc">${esc(block.description).substring(0, 240)}</div>` : ''}
        ${block.source && block.source.url ? `<div class="block-link-url">${esc(block.source.url)}</div>` : ''}
      </div>`;

  } else if (type === 'Attachment' || type === 'Media') {
    const fname = (block.attachment && block.attachment.file_name) || block.title || 'file';
    const ftype = (block.attachment && block.attachment.content_type) || '';
    inner = `
      <div class="block-type-label">Attachment</div>
      <div class="block-attachment">
        <div class="block-attachment-info">
          <div class="block-attachment-name">${esc(fname)}</div>
          ${ftype ? `<div class="block-attachment-type">${esc(ftype)}</div>` : ''}
        </div>
      </div>`;

  } else {
    inner = `
      <div class="block-type-label">${esc(type)}</div>
      <div class="block-text">${esc(block.title || block.content || 'Block')}</div>`;
  }

  const added = block.created_at
    ? new Date(block.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
    : '';
  const pos = block.position ? `#${block.position}` : '';

  blockArea.innerHTML = `
    <div class="block-card">${inner}</div>
    <div class="block-footer">${[pos, added].filter(Boolean).join(' · ')}</div>`;
}

function renderEmpty(msg) {
  blockArea.innerHTML = `<div class="empty-state">${esc(msg)}</div>`;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

btnPick.onclick = fetchRandom;
</script>
</body>
</html>
